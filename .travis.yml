language: php

php:
  - 7.2

install:
  - composer self-update --rollback && composer install

script:
- export TCMS_PRODUCT=$TRAVIS_REPO_SLUG
- export TCMS_PRODUCT_VERSION=$TRAVIS_PULL_REQUEST_BRANCH
- export TCMS_BUILD=$TRAVIS_BUILD_NUMBER
- ./vendor/bin/phpunit tests/

notifications:
  email:
    on_failure: change
    on_success: never
